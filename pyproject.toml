[project]
name = "data-privacy-auditor"
version = "1.0.0"
description = "RL environment for automated data privacy and integrity auditing"
authors = [
    {name = "Arpit Pandey"},
    {name = "Rishabh Mishra"}
]
dependencies = [
    "fastapi",
    "uvicorn",
    "pandas",
    "pydantic",
    "openai",
    "python-dotenv",
    "openenv>=0.2.0" 
]

[project.scripts]
# This defines the "server entry point" the validator is looking for
data-privacy-auditor-server = "server.app:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"